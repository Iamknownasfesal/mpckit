# Example secret manifest. Copy to a private location, fill in real
# values, apply, then DELETE the local copy. Never commit real values.
#
#   cp infra/k8s/overlays/testnet/secrets.example.yaml /tmp/secrets.yaml
#   $EDITOR /tmp/secrets.yaml
#   kubectl -n mpckit-testnet apply -f /tmp/secrets.yaml
#   shred -u /tmp/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: mpckit-secrets
  namespace: mpckit-testnet
type: Opaque
stringData:
  # Postgres connection (in-cluster default — point at managed
  # Postgres in production).
  DATABASE_URL: "postgres://ika:CHANGE_ME@postgres:5432/ika_api"

  # Hot wallet secret (32-byte ed25519, hex). The same key derives the
  # same Sui address on every chain, so one keypair holds the
  # OperatorCap on both testnet and mainnet provided you minted them
  # from this key. Provider=env path; for AWS KMS swap to
  # HOT_WALLET_SUI_SECRET_KMS_CIPHERTEXT_B64 + key id.
  HOT_WALLET_SUI_SECRET_HEX: "REPLACE_WITH_64_HEX_CHARS"

  # Gas station sponsor keypair (base64 of flag||privkey). One keypair
  # sponsors both networks; fund it separately on each chain. Auth
  # tokens are per-network so a leaked testnet token can't reserve
  # mainnet gas.
  SUI_GAS_STATION_SPONSOR_KEYPAIR_B64: "REPLACE_WITH_BASE64"
  SUI_GAS_STATION_TESTNET_AUTH: "REPLACE_WITH_LONG_RANDOM_STRING"
  SUI_GAS_STATION_MAINNET_AUTH: "REPLACE_WITH_LONG_RANDOM_STRING"

  # Billing.
  BILLING_DEPOSIT_MASTER_SEED_HEX: "REPLACE_WITH_64_HEX_CHARS"
  BILLING_SWEEP_DESTINATION_ADDRESS: "0xREPLACE"

  # Bootstrap + dashboard auth.
  ADMIN_API_KEY: "REPLACE_WITH_LONG_RANDOM_STRING"
  BETTER_AUTH_SECRET: "REPLACE_WITH_32_BYTE_RANDOM_STRING"
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: mpckit-testnet
type: Opaque
stringData:
  password: "CHANGE_ME"
