apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Single overlay; one backend stack serves both testnet and mainnet at
# the production hostnames. Dashboard + docs are network-agnostic — the
# dashboard pivots on the x-network header at the UI layer. A network
# is "enabled" when its MPCKITCORE_<NET>_* + gas-station env block is
# set in configmap.yaml; the backend refuses requests for any other.
#
# The overlay name is `testnet` for stability with existing kubeconfig
# secrets and the namespace `mpckit-testnet`, even though it now serves
# mainnet too. Rename in a follow-up if it bothers you.

namespace: mpckit-testnet

resources:
  - ../../base
  - configmap.yaml

images:
  - name: ghcr.io/dwallet-labs/mpckit-backend
    newTag: latest
  - name: ghcr.io/dwallet-labs/mpckit-dashboard
    newTag: latest
  - name: ghcr.io/dwallet-labs/mpckit-docs
    newTag: latest

commonLabels:
  app.kubernetes.io/instance: testnet
