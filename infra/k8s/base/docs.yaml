apiVersion: v1
kind: Service
metadata:
  name: docs
  namespace: mpckit
spec:
  selector:
    app.kubernetes.io/name: docs
  ports:
    - name: http
      port: 3010
      targetPort: 3010
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  namespace: mpckit
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: docs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docs
    spec:
      imagePullSecrets:
        - name: ghcr
      containers:
        - name: docs
          image: ghcr.io/dwallet-labs/mpckit-docs:latest
          ports:
            - name: http
              containerPort: 3010
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3010"
            - name: HOSTNAME
              value: 0.0.0.0
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
