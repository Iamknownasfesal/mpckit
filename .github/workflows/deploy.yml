# Build the three app images on every push to main, push them to
# GitHub Container Registry, then apply the kustomize overlay against
# the production cluster. One backend stack serves both Sui networks
# (testnet + mainnet) at the production hostnames — see
# infra/k8s/overlays/testnet/configmap.yaml for the per-network env
# blocks. To disable a network, drop its MPCKITCORE_<NET>_* block from
# the configmap and scale gas-station-<net> to 0.
#
# Trigger → what happens:
#   push to main         → builds + deploys sha-<short>
#   push tag v*          → builds + deploys the tag image
#   workflow_dispatch    → builds + deploys (image_tag input optional)
#
# Required secrets:
#   KUBECONFIG_TESTNET   base64-encoded kubeconfig (legacy name kept
#                        for backward compatibility; this single
#                        cluster now serves both networks)

name: deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  # ── Build each image once, push to ghcr.io. Tagged with sha + latest
  # (on main) + git tag (on releases) so the deploy job can refer to
  # whichever is appropriate.
  build:
    name: build ${{ matrix.image.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: mpckit-backend
            dockerfile: apps/backend/Dockerfile
            context: .
            build-args: ""
          - name: mpckit-dashboard
            dockerfile: apps/dashboard/Dockerfile
            context: .
            # NEXT_PUBLIC_* values are inlined at build time, including
            # the rewrite in next.config.mjs that proxies /api/auth/*
            # to the backend. Without this arg the rewrite is missing
            # and the dashboard 404s on every auth call.
            build-args: |
              NEXT_PUBLIC_BACKEND_URL=https://api.mpckit.xyz
          - name: mpckit-docs
            dockerfile: apps/docs/Dockerfile
            context: .
            build-args: ""
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          ns="$(echo '${{ env.IMAGE_NAMESPACE }}' | tr '[:upper:]' '[:lower:]')"
          name="${{ env.REGISTRY }}/${ns}/${{ matrix.image.name }}"
          short_sha="${GITHUB_SHA::12}"
          tags="$name:sha-$short_sha"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            tags="$tags,$name:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            git_tag="${GITHUB_REF#refs/tags/}"
            tags="$tags,$name:$git_tag"
          fi
          echo "tags=$tags" >>"$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ matrix.image.build-args }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          provenance: false

  # ── Apply the kustomize overlay. One target: the single stack at
  # `overlays/testnet/` (so named for back-compat with the existing
  # KUBECONFIG_TESTNET secret and `mpckit-testnet` namespace; it now
  # serves both Sui networks).
  deploy:
    name: deploy
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: prod
    steps:
      - uses: actions/checkout@v6

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          kustomize-version: "5.4.3"

      # If the cluster's kubeconfig hasn't been provisioned yet, mark
      # the deploy as a skip and exit success. Image builds still run
      # on every push so CI stays green until the operator is ready to
      # wire up KUBECONFIG_TESTNET.
      - name: Configure kubeconfig
        id: kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_TESTNET }}
        run: |
          set -euo pipefail
          if [[ -z "$KUBECONFIG_B64" ]]; then
            echo "::warning::no KUBECONFIG_TESTNET secret set; skipping kubectl apply"
            echo "skip=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Compute image tag
        if: steps.kubeconfig.outputs.skip != 'true'
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >>"$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >>"$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::12}" >>"$GITHUB_OUTPUT"
          fi

      - name: Pin overlay to image tag
        if: steps.kubeconfig.outputs.skip != 'true'
        working-directory: infra/k8s/overlays/testnet
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          ns="$(echo '${{ env.IMAGE_NAMESPACE }}' | tr '[:upper:]' '[:lower:]')"
          kustomize edit set image \
            ghcr.io/dwallet-labs/mpckit-backend=ghcr.io/${ns}/mpckit-backend:${tag} \
            ghcr.io/dwallet-labs/mpckit-dashboard=ghcr.io/${ns}/mpckit-dashboard:${tag} \
            ghcr.io/dwallet-labs/mpckit-docs=ghcr.io/${ns}/mpckit-docs:${tag}

      - name: Apply
        if: steps.kubeconfig.outputs.skip != 'true'
        run: |
          kubectl apply -k infra/k8s/overlays/testnet

      - name: Wait for rollout
        if: steps.kubeconfig.outputs.skip != 'true'
        run: |
          set -euo pipefail
          ns="mpckit-testnet"
          for d in backend dashboard docs gas-station-testnet gas-station-mainnet; do
            kubectl -n "$ns" rollout status deployment/"$d" --timeout=10m
          done
