name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  ts:
    name: typescript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: install
        run: bun install --frozen-lockfile
      - name: lint
        run: bun run lint
      - name: typecheck
        run: bun run typecheck
      - name: test (sdk-only, no infra)
        run: bun run --filter '@mpckit/sdk' --filter '@mpckit/react' test

  rust:
    name: rust (sdk default)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy (sdk, no crypto)
        run: cargo clippy -p mpckit --no-default-features --all-targets -- -D warnings
      - name: test (sdk, no crypto)
        run: cargo test -p mpckit --no-default-features

  move:
    name: move (prettier-move)
    runs-on: ubuntu-latest
    env:
      PRETTIER_MOVE_VERSION: 0.3.5
    defaults:
      run:
        working-directory: packages/mpckitcore_move
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
      - run: npx -p @mysten/prettier-plugin-move@${{ env.PRETTIER_MOVE_VERSION }} prettier-move -c "sources/**/*.move"

  rust-crypto:
    name: rust (crypto feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-crypto
      - name: clippy (sdk + cli, crypto feature)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build (workspace, crypto feature)
        run: cargo build --workspace --all-targets
