# Builds the sui-gas-station image. Separate from the main deploy
# workflow because (a) the build is slow (cargo + Sui dep graph) and
# (b) it changes rarely — only on Dockerfile or GAS_POOL_REF bumps.
#
# Triggered by:
#   - changes under infra/gas-station/ on main
#   - manual workflow_dispatch with an optional GAS_POOL_REF override

name: gas-station

on:
  push:
    branches: [main]
    paths:
      - infra/gas-station/**
      - .github/workflows/gas-station.yml
  workflow_dispatch:
    inputs:
      gas_pool_ref:
        description: "sui-gas-pool git ref to build"
        required: false
        type: string
        default: "main"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker registries reject uppercase namespaces, but
      # github.repository_owner preserves case. Normalise first.
      - name: Compute image name
        id: img
        run: |
          set -euo pipefail
          ns="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=${{ env.REGISTRY }}/${ns}/mpckit-gas-station" >>"$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: infra/gas-station
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          build-args: |
            GAS_POOL_REF=${{ github.event.inputs.gas_pool_ref || 'main' }}
          cache-from: type=gha,scope=gas-station
          cache-to: type=gha,scope=gas-station,mode=max
          provenance: false
